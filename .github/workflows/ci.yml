name: CI Pipeline Advance

on:
  push:
    branches:
      - main

jobs:
  build-train-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install Dependencies
        # Versi scikit-learn disamakan dengan environment
        run: |
          pip install pandas scikit-learn==1.6.1 matplotlib mlflow==2.19.0

      - name: Run MLflow Project
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Upload Artifacts ke GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: MLProject/mlruns/

      - name: Login ke Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker Image menggunakan MLflow
        run: |
          cd MLProject
          RUN_ID=$(ls -t mlruns/0 | grep -v "meta.yaml" | head -n 1)
          
          echo "Tahap 1: Generate blueprint Dockerfile dari MLflow..."
          mlflow models generate-dockerfile \
            -m "mlruns/0/$RUN_ID/artifacts/random_forest_model" \
            -d build_dir \
            --env-manager=virtualenv

          echo "Tahap 2: Retas dan perbaiki link get-pip.py yang usang di dalam Dockerfile..."
          sed -i 's|https://bootstrap.pypa.io/get-pip.py|https://bootstrap.pypa.io/pip/3.9/get-pip.py|g' build_dir/Dockerfile
          
          echo "Tahap 3: Build Docker Image secara manual dari blueprint yang sudah diperbaiki..."
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/heart-model:latest build_dir
          
          echo "Tahap 4: Push Image ke Docker Hub..."
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/heart-model:latest